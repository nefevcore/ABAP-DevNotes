# 静态资源路径配置
extra_css = ["stylesheets/extra.css"]

# [project.extra_javascript]
# extra_javascript = []

# 静态文件目录配置（确保资源文件可访问）
[project.extra]
generator = false

# 如果使用Zensical，可能需要配置静态资源路径
# 确保08_fiori下的JS等资源能被正确加载
[project.extra.static]
static_dirs = ["08_fiori/excel_viewer", "08_fiori/univer", "08_fiori/lib/js"]

# Markdown扩展配置（保持不变）
[project.markdown_extensions]
admonition = {}
codehilite = { guess_lang = false, linenums = false }
toc = { permalink = true }
footnotes = {}
meta = {}
def_list = {}

[project.markdown_extensions.pymdownx]
arithmatex = { generic = true }
# 改进斜体和粗体，会导致符号前需要加空格，变得麻烦
# betterem = { smart_enable = "all" } 
caret = {}
critic = {}
details = {}
inlinehilite = {}
magiclink = {}
mark = {}
superfences = { custom_fences = [{ name = "mermaid", class = "mermaid" }] }
smartsymbols = {}
tasklist = {}
tilde = {}
highlight = { linenums = true }
tabbed = { alternate_style = true }
emoji = { emoji_index = "zensical.extensions.emoji.twemoji", emoji_generator = "zensical.extensions.emoji.to_svg" }

# 主题配置（保持不变）
[project.theme]
name = "material"
language = "zh"

# 主题功能
features = [
    "announce.dismiss",          # 允许用户关闭网站顶部的公告栏
    "content.code.annotate",     # 支持在代码块中添加注释标记 (1)、(2) 等，并在悬停时显示说明
    "content.code.copy",         # 在代码块右上角添加复制按钮，一键复制代码
    "content.code.select",       # 允许在代码块中添加行号或代码高亮，便于选择性查看
    "content.footnote.tooltips", # 脚注以工具提示形式显示，鼠标悬停时弹出，无需跳转页面
    "content.tabs.link",         # 关联不同页面的选项卡，使点击一个选项卡时其他页面同步切换
    "content.tooltips",          # 为链接添加自定义提示文本（通过 title 属性或 Markdown 扩展）
    # "navigation.footer",           # 页面底部显示上一页/下一页导航链接
    # "navigation.indexes",          # 将部分目录下的 index/ 作为该部分的概述页面
    "navigation.instant",          # 启用瞬时加载，页面切换无需刷新，类似单页应用体验
    "navigation.instant.prefetch", # 预加载用户可能点击的链接，进一步提升页面切换速度
    "navigation.path",             # 页面顶部显示面包屑导航，标明当前位置
    # "navigation.sections",         # 将顶级导航项渲染为可折叠/展开的章节
    "navigation.top",      # 右下角显示返回顶部按钮
    "navigation.tracking", # 更新浏览器地址栏中的锚点（#），与滚动位置同
    "search.highlight",
]

# 调色板配置
[[project.theme.palette]]
scheme = "default"
toggle.icon = "material/toggle-switch"
toggle.name = "切换至夜间模式"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "material/toggle-switch-off-outline"
toggle.name = "切换至日间模式"
